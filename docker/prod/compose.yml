services:
  app:
    image: ${IMAGE}:${IMAGE_TAG}
    restart: unless-stopped

    ports:
      - "8080:80"

    env_file:
      - path: ./prod/.env
      - path: ./prod/override.env

    volumes:
      - runtime:/app/runtime
      - caddy_data:/data
      - caddy_config:/config

    depends_on:
      - db

  db:
    image: mysql:8.0
    restart: unless-stopped

    command: --default-authentication-plugin=mysql_native_password

    env_file:
      - path: ./prod/override.env

    volumes:
      - db:/var/lib/mysql

volumes:
  runtime:
  caddy_data:
  caddy_config:
  db:
