services:
  app:
    build: .
    restart: unless-stopped

    ports:
      - "8080:80"

    env_file:
      - path: ./prod/.env
      - path: ./prod/override.env
        required: false

    volumes:
      - ./:/app:delegated
      - caddy_data:/data
      - caddy_config:/config

    depends_on:
      - db

  db:
    image: mysql:8.0
    restart: unless-stopped

    command: --default-authentication-plugin=mysql_native_password

    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-app}

    volumes:
      - db:/var/lib/mysql

volumes:
  runtime:
  caddy_data:
  caddy_config:
  db:
