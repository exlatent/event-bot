services:
  app:
    image: ${IMAGE}:${IMAGE_TAG}
    restart: unless-stopped

    ports:
      - "${PORT:-80}:80"

    env_file:
      - path: ./prod/.env
      - path: ./prod/override.env
        required: false

    volumes:
      - runtime:/app/runtime

    depends_on:
      - db

  db:
    image: mysql:8.0
    restart: unless-stopped

    command: --default-authentication-plugin=mysql_native_password

    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-app}

    volumes:
      - db:/var/lib/mysql

volumes:
  runtime:
  db:
